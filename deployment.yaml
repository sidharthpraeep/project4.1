apiVersion: apps/v1
kind: Deployment
metadata:
  name: shoe-store
spec:
  replicas: 2
  selector:
    matchLabels:
      app: app
      version: blue
  template:
    metadata:
      labels:
        app: app
        version: blue
    spec:
      imagePullSecrets:
      - name: secrets
      containers:
      - name: ecomshoe
        image: sidh2004/ecomngin:v4
        ports:
        - containerPort: 80
        envFrom:
        - configMapRef:
            name: ecomshoe
        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /
            port: 80

---
apiVersion: v1
kind: Service
metadata:
  name: web
spec:
  selector:
    app: app
    version: blue
  ports:
  - port: 80
    targetPort: 80
  type: ClusterIP